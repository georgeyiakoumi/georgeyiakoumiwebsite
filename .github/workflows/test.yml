name: Tests

on:
  pull_request:
    branches: ['*']
  push:
    branches: ['main', 'claude-audit']

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for code changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.mjs'
              - '**/*.json'
              - '**/*.css'
              - '!**/*.md'

  unit-tests:
    name: Unit & Component Tests
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Skip — docs only
        if: needs.changes.outputs.code != 'true'
        run: echo "No code changes — skipping tests"

      - name: Checkout code
        if: needs.changes.outputs.code == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: needs.changes.outputs.code == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        if: needs.changes.outputs.code == 'true'
        run: npm ci

      - name: Run unit tests
        if: needs.changes.outputs.code == 'true'
        run: npm run test:run

      - name: Generate coverage report
        if: needs.changes.outputs.code == 'true'
        run: npm run test:coverage
        continue-on-error: true

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: needs.changes.outputs.code == 'true'
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  e2e-tests:
    name: E2E Tests
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Skip — docs only
        if: needs.changes.outputs.code != 'true'
        run: echo "No code changes — skipping E2E"

      - name: Checkout code
        if: needs.changes.outputs.code == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: needs.changes.outputs.code == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        if: needs.changes.outputs.code == 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: needs.changes.outputs.code == 'true'
        run: npx playwright install --with-deps chromium

      - name: Build Next.js app
        if: needs.changes.outputs.code == 'true'
        run: npm run build
        env:
          STRAPI_API_URL: https://portfolio-cms-n9hb.onrender.com/api

      - name: Run E2E tests
        if: needs.changes.outputs.code == 'true'
        run: npx playwright test --project=chromium
        env:
          CI: true
          STRAPI_API_URL: https://portfolio-cms-n9hb.onrender.com/api

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure() && needs.changes.outputs.code == 'true'
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure() && needs.changes.outputs.code == 'true'
        with:
          name: test-results
          path: test-results/
          retention-days: 30

  lint:
    name: Lint & Typecheck
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Skip — docs only
        if: needs.changes.outputs.code != 'true'
        run: echo "No code changes — skipping lint & typecheck"

      - name: Checkout code
        if: needs.changes.outputs.code == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: needs.changes.outputs.code == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        if: needs.changes.outputs.code == 'true'
        run: npm ci

      - name: Run ESLint
        if: needs.changes.outputs.code == 'true'
        run: npm run lint

      - name: Run TypeScript typecheck
        if: needs.changes.outputs.code == 'true'
        run: npm run typecheck
